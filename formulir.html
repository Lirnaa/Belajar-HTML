<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulir Pelanggan - UMKM Es Teh Nusantara</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #0f766e;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #134e4a;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        section {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }

        form label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #0f766e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #134e4a;
        }

        footer {
            background-color: #0f766e;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

<header>
    <h1>Formulir Pelanggan</h1>
    <p>Isi formulir untuk memberikan kritik dan saran</p>
</header>

<nav>
    <a href="index.html">Beranda</a>
    <a href="gallery.html">Galeri Foto</a>
    <a href="formulir.html">Formulir</a>
</nav>

<main>

<section>

<form action="#">

    <label>Nama Lengkap:</label>
    <br>

    <input type="text" name="nama">

    <br><br>

    <label>Email:</label>
    <br>

    <input type="email" name="email">

    <br><br>

    <label>Jenis Kelamin:</label>
    <br><br>

    <input type="radio" name="jk">
    Laki-laki

    <input type="radio" name="jk">
    Perempuan

    <br><br>

    <label>Menu Favorit:</label>
    <br><br>

    <input type="checkbox">
    Es Teh Original

    <br>

    <input type="checkbox">
    Es Teh Lemon

    <br>

    <input type="checkbox">
    Es Teh Susu

    <br><br>

    <label>Pesan dan Saran:</label>
    <br>

    <textarea rows="5"></textarea>

    <br><br>

    <label>Upload Bukti Pembelian:</label>
    <br><br>

    <input type="file">

    <br><br>

    <button type="submit">
        Kirim
    </button>

</form>

</section>

</main>

<footer>
    <p>&copy; 2026 UMKM Es Teh Nusantara</p>
</footer>

</body>
</html>
